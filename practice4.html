<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>계정 정보</legend>
            <p>
                <label for="userId">아이디:</label>
                <input type="text" id="userId" name="userId" minlength="4" maxlength="5" required placeholder="4~15자 영문/숫자">
                <small>(필수)</small>
            </p>

            <p>
                <label for="userPw">비밀번호:</label>
                <input type="password" id="userPw" name="userPw" minlength="8" required placeholder="8자 이상 입력">
                <small>(필수)</small>
            </p>
        </fieldset>
    </form>

</body>
</html>
